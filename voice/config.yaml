audio:
  backend: "pipewire"
  input_device: ""
  output_device: ""
  sample_rate: 16000
  channels: 1
  max_record_seconds: 12

stt:
  backend: "whisper_server"
  server_url: "http://127.0.0.1:8081/inference"
  language_field: "language"
  file_field: "file"
  response_text_key: "text"
  request_timeout_sec: 30
  lang: "de"

llm:
  base_url: "http://127.0.0.1:8080/v1"
  model_alias: "qwen-local"
  temperature: 0.7
  top_p: 0.9
  max_tokens: 400
  request_timeout_sec: 120

tts:
  backend: "orpheus_server"
  base_url: "http://127.0.0.1:5005/v1"
  model: "orpheus"
  voice: "tara"
  format: "wav"
  request_timeout_sec: 120

prompts:
  system: "Du bist ein hilfreicher Sprachassistent. Antworte auf Deutsch, klar und kurz."
